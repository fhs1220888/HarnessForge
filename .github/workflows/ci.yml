name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        # 36 tests: trace/config/task/proposal/stats/context/search/select/
        # tb-adapter units + mock-LLM end-to-end loop. No API key, no Docker, no cost.
        run: pytest -q
